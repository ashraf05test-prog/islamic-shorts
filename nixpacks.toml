[phases.setup]
aptPkgs = [
  "python3", "python3-pip",
  "python3-gi", "python3-gi-cairo",
  "gir1.2-pango-1.0",
  "libcairo2-dev", "libpango1.0-dev",
  "ffmpeg", "fontconfig",
  "fonts-noto-color-emoji",
  "wget", "curl", "yt-dlp"
]

[phases.install]
cmds = [
  "pip3 install --break-system-packages pycairo requests",
  "mkdir -p fonts /usr/local/share/fonts/truetype/custom",
  "wget -q -O fonts/BalooDa2-Bold.ttf 'https://github.com/EkType/BalooDa2/raw/master/fonts/ttf/BalooDa2-Bold.ttf' || wget -q -O fonts/BalooDa2-Bold.ttf 'https://fonts.gstatic.com/s/balooda2/v7/2nFuWnRgALanXAG_LOhwkasxIOQ.ttf'",
  "cp fonts/BalooDa2-Bold.ttf /usr/local/share/fonts/truetype/custom/ || true",
  "fc-cache -f -v || true",
  "npm install"
]

[start]
cmd = "node server.js"
